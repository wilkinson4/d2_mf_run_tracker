name: Code quality

on:
  pull_request:
    branches: main

jobs:
  quality:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Deps
        run: bun install
        shell: bash

      - name: Run biome and tsc
        run: bun check
        shell: bash
